name: Build desktop app

on:
  push:
    branches: [main]
    paths:
      - "shorts-cutter/**"
      - ".github/workflows/build-desktop.yml"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: VideoBust-windows
            dist_path: shorts-cutter/desktop_app/dist/VideoBust-windows.exe
          - os: macos-latest
            artifact: VideoBust-macos
            dist_path: shorts-cutter/desktop_app/dist/VideoBust-macos.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Locate ffmpeg (Windows)
        # Get-Command/`where ffmpeg` only finds choco's shim in chocolatey\bin -
        # a tiny redirector stub that hardcodes the absolute path to the real
        # binary under chocolatey\lib on THIS machine. Bundling the shim ships
        # a ffmpeg.exe that can't find its target on a user's PC and looks
        # exactly like "ffmpeg not installed". Find the real binary instead.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $chocoLib = if ($env:ChocolateyInstall) { Join-Path $env:ChocolateyInstall 'lib' } else { 'C:\ProgramData\chocolatey\lib' }
          $real = Get-ChildItem -Path $chocoLib -Recurse -Filter ffmpeg.exe -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $real) { throw "Could not find the real ffmpeg.exe under $chocoLib (only the chocolatey\bin shim?)" }
          "FFMPEG_PATH=$real" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Locate ffmpeg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: echo "FFMPEG_PATH=$(command -v ffmpeg)" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: pip install -r shorts-cutter/desktop_app/requirements.txt

      - name: Write version
        shell: bash
        run: echo "__version__ = \"1.0.${{ github.run_number }}\"" > shorts-cutter/desktop_app/version.py

      - name: Build .icns app icon (macOS)
        if: runner.os == 'macOS'
        working-directory: shorts-cutter/desktop_app/assets
        run: |
          mkdir icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size icon.png --out icon.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double icon.png --out icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build
        working-directory: shorts-cutter/desktop_app
        run: pyinstaller --noconfirm build.spec

      - name: Rename exe (Windows)
        if: runner.os == 'Windows'
        working-directory: shorts-cutter/desktop_app/dist
        run: Rename-Item VideoBust.exe VideoBust-windows.exe

      - name: Zip .app bundle (macOS)
        # actions/upload-artifact со сырой .app-папкой обрезает верхний уровень
        # (папку VideoBust.app) и кладёт в архив только её содержимое — на выходе
        # получается голый Contents/ вместо валидного бандла. Зипуем сами, ditto
        # сохраняет структуру бандла и права на исполняемый файл как положено.
        if: runner.os == 'macOS'
        working-directory: shorts-cutter/desktop_app/dist
        run: ditto -c -k --keepParent VideoBust.app VideoBust-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          files: |
            artifacts/VideoBust-windows/VideoBust-windows.exe
            artifacts/VideoBust-macos/VideoBust-macos.zip
